name: 💡 Feature Request
description: Suggest something TrailGuide should do
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Have an idea that would make TrailGuide more useful for studying or teaching? Let us know.

  - type: textarea
    id: problem
    attributes:
      label: What problem would this solve?
      description: What are you trying to do that TrailGuide doesn't support today?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: What would you like to see?
      description: Describe the feature or change you have in mind.
    validations:
      required: true

  - type: dropdown
    id: audience
    attributes:
      label: Who is this for?
      options:
        - Students
        - Teachers / TAs / Course Designers
        - Both
    validations:
      required: false

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives you've tried
      description: Any workarounds or other tools you're currently using instead?
    validations:
      required: false

  - type: textarea
    id: context
    attributes:
      label: Additional context
    validations:
      required: false
